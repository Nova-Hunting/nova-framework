name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  whitespace:
    name: Whitespace
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed whitespace
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check "${{ github.event.pull_request.base.sha }}...HEAD"
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scan for committed secrets
        run: python scripts/check_secrets.py

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            setup.py
            requirements.txt

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,lint]"

      - name: Run static checks
        run: python -m ruff check nova tests scripts

      - name: Run tests
        run: python -m pytest -q

      - name: Compile package
        run: python -m compileall -q nova tests scripts

  package:
    name: Build package
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            setup.py
            pyproject.toml
            requirements.txt

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install "build~=1.2.2" "twine~=6.2.0"

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Verify release artifacts
        run: python scripts/verify_artifacts.py

      - name: Smoke test wheel install
        run: python scripts/smoke_wheel.py

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            setup.py
            requirements.txt

      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pip-audit~=2.10.0"

      - name: Audit declared dependency groups
        run: python scripts/audit_dependencies.py
